<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WATCHES</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f6f3ef;
  font-family:'Inter',sans-serif;
  color:#4e4035;
}

header{
  text-align:center;
  padding:40px 20px;
  background:white;
  border-bottom:1px solid #eee;
}

header h1{
  font-family:'Playfair Display',serif;
  letter-spacing:2px;
  color:#5a4636;
}

header p{
  color:#8b7b6b;
  font-size:14px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:25px;
}

.category-filter{
  text-align:center;
  margin-bottom:25px;
}

.category-filter button{
  margin:5px;
  padding:8px 15px;
  border:none;
  background:#7a5c46;
  color:white;
  border-radius:20px;
  cursor:pointer;
  font-size:13px;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:white;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.05);
  position:relative;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.price{
  padding:8px 12px;
  font-weight:500;
  color:#5a4636;
}

.desc{
  padding:12px;
  font-size:13px;
  line-height:1.4;
}

.admin-btn{
  text-align:center;
  margin-top:40px;
}

.admin-btn button{
  background:#5c4433;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
}

.dashboard{
  display:none;
  margin-top:40px;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.drop-zone{
  border:2px dashed #c8b9aa;
  padding:30px;
  text-align:center;
  border-radius:10px;
  margin-bottom:15px;
  background:#faf8f5;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:5px;
  font-family:'Inter';
}

button.upload{
  margin-top:10px;
  background:#7a5c46;
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}

.card button{
  margin-top:5px;
  background:#a67853;
  color:white;
  border:none;
  padding:5px 8px;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
  margin-right:5px;
}

footer{
  text-align:center;
  padding:20px;
  margin-top:60px;
  font-size:12px;
  color:#8f7f6f;
}

@media(max-width:600px){
  header{
    padding:30px 10px;
  }
  .gallery{
    grid-template-columns:repeat(2,1fr);
  }
}

</style>

</head>

<body>

<header>
<h1>WATCHES</h1>
<p>Minimalist product gallery</p>
</header>

<div class="container">

<div class="category-filter" id="filters"></div>

<div class="gallery" id="gallery"></div>

<div class="admin-btn">
<button onclick="openLogin()">Admin</button>
</div>

<div id="login" style="display:none;text-align:center;margin-top:20px;">
<input type="password" id="password" placeholder="Admin password">
<button onclick="login()">Login</button>
</div>

<div class="dashboard" id="dashboard">

<h3>Upload Products</h3>

<div class="drop-zone" id="dropZone">
Drag & Drop Images Here
</div>

<input type="file" id="images" multiple>

<input type="text" id="price" placeholder="Price e.g. $120">

<select id="category">
  <option>General</option>
  <option>Luxury</option>
  <option>Sport</option>
  <option>Men's Watch</option>
  <option>Women's Watch</option>
  <option>Other</option>
</select>

<textarea id="description" placeholder="Product description"></textarea>

<button class="upload" onclick="upload()">Upload</button>

</div>

</div>

<footer>
WATCHES Minimal Business Website
</footer>

<script>

const PASSWORD="watchadmin123";
let droppedFiles=[];

function openLogin(){
  document.getElementById("login").style.display="block";
}

function login(){
  if(document.getElementById("password").value===PASSWORD){
    document.getElementById("dashboard").style.display="block";
  }else{
    alert("Wrong password");
  }
}

const dropZone=document.getElementById("dropZone");

dropZone.addEventListener("dragover",e=>{ e.preventDefault(); });
dropZone.addEventListener("drop",e=>{
  e.preventDefault();
  droppedFiles=[...e.dataTransfer.files];
  alert(droppedFiles.length+" images added");
});

function upload(){
  let files=[...document.getElementById("images").files,...droppedFiles];
  let desc=document.getElementById("description").value;
  let category=document.getElementById("category").value;
  let price=document.getElementById("price").value;

  let items=JSON.parse(localStorage.getItem("products"))||[];

  files.forEach(file=>{
    let reader=new FileReader();
    reader.onload=function(){
      items.push({
        img:reader.result,
        desc:desc,
        category:category,
        price:price
      });
      localStorage.setItem("products",JSON.stringify(items));
      loadGallery();
    }
    reader.readAsDataURL(file);
  });

  document.getElementById("description").value="";
  document.getElementById("price").value="";
  document.getElementById("images").value="";
  droppedFiles=[];
}

function loadGallery(){
  let gallery=document.getElementById("gallery");
  gallery.innerHTML="";
  let items=JSON.parse(localStorage.getItem("products"))||[];

  items.forEach((item,index)=>{
    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${item.img}">
      <div class="price">${item.price}</div>
      <div class="desc">
        <strong>${item.category}</strong><br>
        ${item.desc}
        <br>
        <button onclick="editItem(${index})">Edit</button>
        <button onclick="deleteItem(${index})">Delete</button>
      </div>
    `;
    gallery.appendChild(card);
  });

  buildFilters(items);
}

function buildFilters(items){
  let filters=document.getElementById("filters");
  let categories=[...new Set(items.map(i=>i.category))];
  filters.innerHTML=`<button onclick="filter('all')">All</button>`;
  categories.forEach(cat=>{
    filters.innerHTML+=`<button onclick="filter('${cat}')">${cat}</button>`;
  });
}

function filter(category){
  let gallery=document.getElementById("gallery");
  let items=JSON.parse(localStorage.getItem("products"))||[];
  gallery.innerHTML="";
  items.filter(i=>category==="all"||i.category===category)
    .forEach((item,index)=>{
      let card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <img src="${item.img}">
        <div class="price">${item.price}</div>
        <div class="desc">
          <strong>${item.category}</strong><br>
          ${item.desc}
          <br>
          <button onclick="editItem(${index})">Edit</button>
          <button onclick="deleteItem(${index})">Delete</button>
        </div>
      `;
      gallery.appendChild(card);
    });
}

function deleteItem(index){
  let items=JSON.parse(localStorage.getItem("products"))||[];
  items.splice(index,1);
  localStorage.setItem("products",JSON.stringify(items));
  loadGallery();
}

function editItem(index){
  let items=JSON.parse(localStorage.getItem("products"))||[];
  let newDesc=prompt("Edit description:", items[index].desc);
  let newPrice=prompt("Edit price:", items[index].price);
  if(newDesc!==null && newPrice!==null){
    items[index].desc=newDesc;
    items[index].price=newPrice;
    localStorage.setItem("products",JSON.stringify(items));
    loadGallery();
  }
}

loadGallery();

</script>

</body>
</html>
